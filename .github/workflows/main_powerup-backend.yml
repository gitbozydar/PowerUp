name: Build and deploy Node.js app to Azure Web App - powerup-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies (backend only)
        working-directory: backend
        run: npm install

      - name: Build (if exists)
        working-directory: backend
        run: npm run build --if-present

      - name: Upload artifact (backend only)
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D8E9FE5E0DF14CB182D03800912BBE82 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4ED0EEBCE6DB4AB1BF15F2985BAA5FEB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6FA2824814D54513AF7C14F00F4FD18F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'powerup-backend'
          slot-name: 'Production'
          package: backend
